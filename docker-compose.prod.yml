# Atlas One — Production Stack
# Usage:
#   cp .env.production.example .env
#   # edit .env with real secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Health: http://localhost/api/health  (via nginx)
# No Cloudflare quick tunnel — use fixed domain + Cloudflare DNS or certbot.

services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas_prod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-atlas_one}
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas_one}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: atlas_prod_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  evolution-postgres:
    image: postgres:16-alpine
    container_name: atlas_prod_evolution_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:-evolution}
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data

  evolution-redis:
    image: redis:7-alpine
    container_name: atlas_prod_evolution_redis
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: atlas_prod_evolution
    restart: unless-stopped
    depends_on:
      - evolution-postgres
      - evolution-redis
    environment:
      SERVER_URL: ${EVOLUTION_PUBLIC_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:?Set EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_DB_PASSWORD:-evolution}@evolution-postgres:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
    volumes:
      - evolution_instances:/evolution/instances

  atlas-server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: atlas_prod_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-atlas_one}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      EVOLUTION_URL: http://evolution-api:8080
      EVOLUTION_WEBHOOK_BASE_URL: http://nginx
    volumes:
      - atlas_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  atlas-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://app.atlasone.app.br}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-https://app.atlasone.app.br}
    container_name: atlas_prod_web
    restart: unless-stopped
    depends_on:
      atlas-server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    container_name: atlas_prod_proxy
    restart: unless-stopped
    depends_on:
      - atlas-server
      - atlas-web
    ports:
      - "80:80"
      # - "443:443"  # mount certs for direct TLS
    volumes:
      - ./infra/nginx/atlas-prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  atlas_postgres_data:
  evolution_postgres_data:
  evolution_instances:
  atlas_uploads:
