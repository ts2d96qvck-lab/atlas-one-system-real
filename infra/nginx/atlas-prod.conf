# Production reverse proxy — API + Web inside Docker network (no host.docker.internal)

upstream atlas_api {
  server atlas-server:4000;
}

upstream atlas_web {
  server atlas-web:3001;
}

server {
  listen 80;
  server_name app.atlasone.app.br *.atlasone.app.br _;

  client_max_body_size 50m;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Redirect HTTP to HTTPS when TLS terminates at Cloudflare or certbot
  # Uncomment after HTTPS is configured on the load balancer:
  # if ($http_x_forwarded_proto != "https") {
  #   return 301 https://$host$request_uri;
  # }

  location /socket.io/ {
    proxy_pass http://atlas_api/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location ~ ^/api/(health|ready)(/|$) {
    proxy_pass http://atlas_api/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/(auth|inbox|admin|crm|dashboard|automations|campaigns|whatsapp|payments|health|ready|webhook|media|api|ops|v1)(/|$) {
    proxy_pass http://atlas_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://atlas_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
