# Bootstrap HTTP-only config — use ONLY to obtain the first Let's Encrypt certificate.
# After certs exist, switch to atlas-prod.conf (see scripts/vps-enable-https.sh).

upstream atlas_api {
  server atlas-server:4000;
}

upstream atlas_web {
  server atlas-web:3001;
}

server {
  listen 80;
  server_name app.atlasone.app.br *.atlasone.app.br;

  client_max_body_size 50m;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    allow all;
  }

  location /socket.io/ {
    proxy_pass http://atlas_api/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location ~ ^/api/(health|ready)(/|$) {
    proxy_pass http://atlas_api/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/(auth|inbox|admin|crm|dashboard|automations|campaigns|whatsapp|payments|health|ready|webhook|media|api|ops|v1)(/|$) {
    proxy_pass http://atlas_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://atlas_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
