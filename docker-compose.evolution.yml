# Modelo opcional para rodar Evolution API localmente.
# Pode exigir ajustes conforme sua versão da Evolution API.
# Para produção, prefira VPS/Railway com volume persistente.

services:
  postgres:
    image: postgres:16
    container_name: atlas_evolution_postgres
    restart: always
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: atlas_evolution_redis
    restart: always
    ports:
      - "6380:6379"

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: atlas_evolution_api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-CHANGE_ME_EVOLUTION_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      LOG_LEVEL: ERROR
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_postgres:
  evolution_instances:
